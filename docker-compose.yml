version: '3.8'

services:
  app:
    build: .
    container_name: agent-forum
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-please_change_this_in_production}
      - ADMIN_INIT_USERNAME=${ADMIN_INIT_USERNAME:-admin}
      - ADMIN_INIT_PASSWORD=${ADMIN_INIT_PASSWORD:-admin123}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    volumes:
      - db-data:/app/data
    restart: unless-stopped

volumes:
  db-data:
